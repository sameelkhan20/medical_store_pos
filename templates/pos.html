{% extends "base.html" %}

{% block content %}
<style>
    .pos-container {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 20px;
        height: calc(100vh - 120px);
    }
    
    .scanner-input {
        width: 100%;
        padding: 15px;
        font-size: 1.2rem;
        border: 2px solid var(--primary-color);
        border-radius: 8px;
        margin-bottom: 20px;
        outline: none;
        background-color: #F9FAFB;
    }
    .scanner-input:focus {
        background-color: var(--white);
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
    }

    .cart-table th, .cart-table td {
        padding: 12px;
        text-align: left;
        border-bottom: 1px solid #E5E7EB;
    }
    
    .qty-input {
        width: 60px;
        padding: 5px;
        border: 1px solid #D1D5DB;
        border-radius: 4px;
        text-align: center;
    }

    .summary-card {
        background: var(--sidebar-bg);
        color: var(--white);
        padding: 25px;
        border-radius: 12px;
        display: flex;
        flex-direction: column;
        box-shadow: var(--card-shadow);
    }
    
    .summary-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 15px;
        font-size: 1.1rem;
    }
    
    .summary-total {
        font-size: 1.5rem;
        font-weight: bold;
        color: var(--success);
        border-top: 1px solid #374151;
        padding-top: 15px;
        margin-top: 10px;
    }
    
    .discount-input {
        width: 100px;
        padding: 5px;
        border-radius: 4px;
        border: none;
        text-align: right;
        font-size: 1rem;
    }
    
    .checkout-btn {
        background: var(--success);
        color: var(--white);
        border: none;
        padding: 15px;
        font-size: 1.2rem;
        border-radius: 8px;
        cursor: pointer;
        margin-top: auto;
        font-weight: bold;
        transition: 0.2s;
    }
    
    .checkout-btn:hover {
        background: #059669;
        transform: scale(1.02);
    }
</style>

<div class="page-title">Point of Sale (Checkout)</div>

<div class="pos-container">
    <div class="card" style="display: flex; flex-direction: column;">
        <input type="text" id="barcodeScanner" class="scanner-input" placeholder="Scan Medicine Barcode Here..." autofocus autocomplete="off">
        
        <div style="flex: 1; overflow-y: auto;">
            <table class="cart-table" style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr>
                        <th>Item</th>
                        <th>Price</th>
                        <th>Qty</th>
                        <th>Total</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="cartTableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <div class="summary-card">
        <h3 style="margin-bottom: 20px; border-bottom: 1px solid #374151; padding-bottom: 10px;">
            <i class="fa-solid fa-receipt"></i> Bill Summary
        </h3>
        
        <div class="summary-row">
            <span>Subtotal:</span>
            <span id="subtotalAmount">Rs. 0.00</span>
        </div>
        
        <div class="summary-row" style="align-items: center;">
            <span>Discount (Rs):</span>
            <input type="number" id="discountInput" class="discount-input" value="0" min="0">
        </div>
        
        <div class="summary-row summary-total">
            <span>Final Total:</span>
            <span id="finalAmount">Rs. 0.00</span>
        </div>

        <button id="checkoutBtn" class="checkout-btn">
            <i class="fa-solid fa-check-circle"></i> Complete Checkout
        </button>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Sidebar highlight karne ke liye
    document.getElementById('nav-pos').classList.add('active');
</script>
<script src="/static/js/pos.js"></script>
{% endblock %}
